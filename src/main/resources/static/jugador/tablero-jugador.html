<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MalaPATA - Tablero jugador</title>
    <script type="module" src="/CommandDispatcher.js"></script>
    <style>
        :root {
            --page: #f4f7f3;
            --surface: #ffffff;
            --surface-soft: #edf4ef;
            --ink: #1d2a27;
            --muted: #63746f;
            --line: #d7e1dc;
            --primary: #0f6b61;
            --primary-dark: #0a433f;
            --accent: #ef7b45;
            --gold: #f2c14e;
            --ok: #248f5f;
            --info: #4068b1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--page);
            color: var(--ink);
            font-family: "Segoe UI", Arial, Helvetica, sans-serif;
        }

        button {
            border: 1px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 800;
            font: inherit;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 66px;
            padding: 0 28px;
            background: var(--surface);
            border-bottom: 1px solid var(--line);
            box-shadow: 0 8px 24px rgba(22, 48, 42, 0.08);
        }

        .brand {
            color: var(--primary-dark);
            font-size: 19px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .account {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 13px;
        }

        .balance-pill {
            border: 1px solid var(--line);
            border-radius: 999px;
            background: var(--surface-soft);
            padding: 7px 12px;
        }

        .balance-pill strong {
            color: var(--ok);
        }

        .avatar {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            border-radius: 6px;
            color: var(--ink);
            background: var(--gold);
            font-weight: 900;
        }

        .logout {
            color: var(--primary);
            background: #ffffff;
            border-color: var(--line);
            padding: 8px 12px;
        }

        .logout:hover {
            color: #ffffff;
            background: var(--primary);
            border-color: var(--primary);
        }

        .page {
            width: min(1280px, calc(100% - 32px));
            margin: 24px auto 32px;
        }

        .summary {
            display: grid;
            grid-template-columns: 1.4fr repeat(3, 1fr);
            gap: 12px;
        }

        .metric {
            min-height: 86px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-left: 5px solid var(--primary);
            border-radius: 6px;
            padding: 16px;
            box-shadow: 0 8px 22px rgba(22, 48, 42, 0.06);
        }

        .metric:nth-child(2) {
            border-left-color: var(--gold);
        }

        .metric:nth-child(3) {
            border-left-color: var(--accent);
        }

        .metric span {
            display: block;
            color: var(--muted);
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .metric strong {
            display: block;
            margin-top: 8px;
            color: var(--primary-dark);
            font-size: 20px;
        }

        .section-title {
            margin: 26px 0 12px;
            color: var(--ink);
            font-size: 17px;
        }

        .race-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 14px;
            align-items: start;
        }

        .race-card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 22px rgba(22, 48, 42, 0.06);
        }

        .race-head {
            display: grid;
            grid-template-columns: 40px 1fr;
            gap: 12px;
            align-items: center;
            padding: 16px;
            background: var(--surface-soft);
        }

        .race-number {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            color: #ffffff;
            background: var(--primary);
            border-radius: 6px;
            font-weight: 900;
        }

        .race-name {
            color: var(--primary-dark);
            font-weight: 900;
        }

        .race-date {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .horse-table {
            width: 100%;
            border-collapse: collapse;
        }

        .horse-table th,
        .horse-table td {
            padding: 10px 12px;
            border-top: 1px solid var(--line);
            font-size: 12px;
            text-align: left;
        }

        .horse-table th {
            color: var(--muted);
            background: #fbfdfb;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .horse-number,
        .dividend {
            color: var(--accent);
            font-weight: 900;
        }

        .bet-btn {
            min-width: 74px;
            color: #ffffff;
            background: var(--accent);
            padding: 7px 9px;
            font-size: 11px;
        }

        .bet-btn:hover {
            background: #c95f2e;
        }

        .bet-types {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .type-btn {
            color: var(--primary-dark);
            background: #ffffff;
            border: 1px solid var(--line);
            padding: 9px 14px;
        }

        .type-btn.active {
            color: var(--ink);
            background: var(--gold);
            border-color: var(--gold);
        }

        .bets-table-wrap {
            overflow-x: auto;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--surface);
            box-shadow: 0 8px 22px rgba(22, 48, 42, 0.06);
        }

        .bets-table {
            width: 100%;
            min-width: 980px;
            border-collapse: collapse;
        }

        .bets-table th,
        .bets-table td {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            font-size: 12px;
            text-align: left;
        }

        .bets-table th {
            color: var(--primary-dark);
            background: var(--surface-soft);
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .amount {
            color: var(--accent);
            font-weight: 900;
        }

        .paid {
            color: var(--ok);
            font-weight: 900;
        }

        .status {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            border-radius: 999px;
            padding: 2px 9px;
            font-size: 10px;
            font-weight: 900;
        }

        .status.pending {
            color: #ffffff;
            background: var(--info);
        }

        .status.done {
            color: #ffffff;
            background: var(--ok);
        }

        .empty {
            padding: 18px;
            color: var(--muted);
        }

        @media (max-width: 760px) {
            .topbar,
            .account {
                align-items: flex-start;
                flex-direction: column;
            }

            .topbar {
                padding: 16px;
            }

            .summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <script src="/utilesVista.js"></script>

    <header class="topbar">
        <div class="brand">MalaPATA</div>
        <div class="account">
            <span class="balance-pill">Saldo <strong id="saldoTop">$0</strong></span>
            <span id="iniciales" class="avatar">--</span>
            <strong id="nombreJugador">Jugador</strong>
            <button class="logout" type="button" onclick="logout()">Cerrar sesión</button>
        </div>
    </header>

    <main class="page">
        <section class="summary">
            <div class="metric">
                <span>Jugador</span>
                <strong id="jugadorResumen">-</strong>
            </div>
            <div class="metric">
                <span>Saldo actual</span>
                <strong id="saldoActual">$0</strong>
            </div>
            <div class="metric">
                <span>Total apostado</span>
                <strong id="totalApostado">$0</strong>
            </div>
            <div class="metric">
                <span>Total ganado</span>
                <strong id="totalGanado">$0</strong>
            </div>
        </section>

        <h2 class="section-title">Carreras disponibles para apostar</h2>
        <section id="carrerasDisponibles" class="race-grid"></section>

        <h2 class="section-title">Tipos de apuesta disponibles</h2>
        <div id="tiposApuesta" class="bet-types"></div>

        <h2 class="section-title">Mis apuestas</h2>
        <section class="bets-table-wrap">
            <table class="bets-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Nro. carrera</th>
                        <th>Carrera</th>
                        <th>Nro. caballo</th>
                        <th>Caballo</th>
                        <th>Monto apostado</th>
                        <th>Tipo</th>
                        <th>Dividendo final</th>
                        <th>Monto cobrado</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="misApuestas"></tbody>
            </table>
        </section>
    </main>

    <script>
        let tipoSeleccionado = null;

        document.addEventListener('DOMContentLoaded', function () {
            const vistaTablero = CommandDispatcher.registerView('TableroJugador', {
                onException: async (msg) => await mostrarMensaje(msg),
                onError: async (status, text) => await mostrarMensaje('Error ' + status + ': ' + text)
            });

            vistaTablero.handler('mostrarTableroUsuario', mostrarTablero);
            vistaTablero.handler('apuestaPreparada', (urlDestino) => window.location.href = '/' + urlDestino);
            vistaTablero.handler('usuarioNoAutenticado', (urlDestino) => window.location.href = '/' + urlDestino);
            vistaTablero.handler('mensaje', async (mensaje) => await mostrarMensaje(mensaje));
            vistaTablero.handler('eventoSistema', (evento) => {
                if (evento.tipo === 'TABLEROS_ACTUALIZADOS') {
                    cargarTablero();
                }
            });

            CommandDispatcher.startView(vistaTablero);
            const eventos = CommandDispatcher.connectEvents();
            window.addEventListener('beforeunload', () => eventos?.close());
            cargarTablero();
        });

        function cargarTablero() {
            CommandDispatcher.submit('/jugador/apuestas/tablero', {}, 'GET');
        }

        function mostrarTablero(tablero) {
            document.getElementById('saldoTop').textContent = formatearMonto(tablero.saldoActual);
            document.getElementById('iniciales').textContent = tablero.iniciales || '--';
            document.getElementById('nombreJugador').textContent = tablero.nombreJugador;
            document.getElementById('jugadorResumen').textContent = tablero.nombreJugador;
            document.getElementById('saldoActual').textContent = formatearMonto(tablero.saldoActual);
            document.getElementById('totalApostado').textContent = formatearMonto(tablero.totalApostado);
            document.getElementById('totalGanado').textContent = formatearMonto(tablero.totalGanado);
            mostrarModalidades(tablero.modalidadesApuesta || []);
            document.getElementById('carrerasDisponibles').innerHTML = crearCarreras(tablero.carrerasDisponibles || []);
            document.getElementById('misApuestas').innerHTML = crearApuestas(tablero.misApuestas || []);
        }

        function crearCarreras(carreras) {
            if (carreras.length === 0) {
                return '<p class="empty">No hay carreras abiertas</p>';
            }

            return carreras.map((carrera) => `
                <article class="race-card">
                    <div class="race-head">
                        <span class="race-number">${carrera.numero}</span>
                        <div>
                            <div class="race-name">${escapar(carrera.nombre)}</div>
                            <div class="race-date">${formatearFecha(carrera.fecha)}</div>
                        </div>
                    </div>
                    <table class="horse-table">
                        <thead>
                            <tr>
                                <th>Nro.</th>
                                <th>Caballo</th>
                                <th>Dividendo</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${(carrera.caballos || []).map((caballo) => `
                                <tr>
                                    <td class="horse-number">${caballo.numero}</td>
                                    <td>${escapar(caballo.nombre)}</td>
                                    <td class="dividend">${formatearDividendo(caballo.dividendoActual)}</td>
                                    <td>
                                        <button class="bet-btn" type="button"
                                            onclick="prepararApuesta('${carrera.fecha}', ${carrera.numero}, ${caballo.numero})">
                                            Apostar
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </article>
            `).join('');
        }

        function crearApuestas(apuestas) {
            if (apuestas.length === 0) {
                return '<tr><td colspan="10" class="empty">Todavía no tenés apuestas.</td></tr>';
            }

            return apuestas.map((apuesta) => `
                <tr>
                    <td>${formatearFecha(apuesta.fecha)}</td>
                    <td>${apuesta.numeroCarrera}</td>
                    <td>${escapar(apuesta.nombreCarrera)}</td>
                    <td>${apuesta.numeroCaballo}</td>
                    <td>${escapar(apuesta.nombreCaballo)}</td>
                    <td class="amount">${formatearMonto(apuesta.montoApostado)}</td>
                    <td>${escapar(apuesta.tipoApuesta)}</td>
                    <td>${Number(apuesta.dividendoFinal || 0).toFixed(2)}</td>
                    <td class="paid">${formatearMonto(apuesta.montoCobrado)}</td>
                    <td><span class="status ${apuesta.estado === 'Finalizada' ? 'done' : 'pending'}">${escapar(apuesta.estado)}</span></td>
                </tr>
            `).join('');
        }

        function mostrarModalidades(modalidades) {
            const contenedor = document.getElementById('tiposApuesta');
            if (!Array.isArray(modalidades) || modalidades.length === 0) {
                tipoSeleccionado = null;
                contenedor.innerHTML = '<p class="empty">No hay tipos de apuesta definidos.</p>';
                return;
            }

            if (!tipoSeleccionado || !modalidades.includes(tipoSeleccionado)) {
                tipoSeleccionado = modalidades[0];
            }
            contenedor.innerHTML = modalidades.map((modalidad) => `
                <button class="type-btn ${modalidad === tipoSeleccionado ? 'active' : ''}"
                        type="button" data-tipo="${escapar(modalidad)}">${escapar(modalidad)}</button>
            `).join('');
            contenedor.querySelectorAll('.type-btn').forEach((boton) => {
                boton.addEventListener('click', () => {
                    contenedor.querySelectorAll('.type-btn').forEach((btn) => btn.classList.remove('active'));
                    boton.classList.add('active');
                    tipoSeleccionado = boton.dataset.tipo;
                });
            });
        }

        function prepararApuesta(fecha, nroCarrera, nroCaballo) {
            if (!tipoSeleccionado) {
                mostrarMensaje('Debe seleccionar un tipo de apuesta');
                return;
            }
            const montoIngresado = prompt('Monto a apostar:', '1500');
            if (montoIngresado === null) {
                return;
            }

            const monto = Number(String(montoIngresado).replace(',', '.'));
            if (!Number.isFinite(monto) || monto < 1) {
                mostrarMensaje('Monto inválido');
                return;
            }

            CommandDispatcher.submit('/jugador/apuestas/preparar', {
                fecha,
                nroCarrera,
                nroCaballo,
                monto,
                tipoApuesta: tipoSeleccionado
            });
        }

        function logout() {
            CommandDispatcher.submit('/login-jugador/logout', {});
        }

        function formatearMonto(valor) {
            return '$' + Number(valor || 0).toLocaleString('es-UY');
        }

        function formatearFecha(valor) {
            if (!valor) {
                return '';
            }
            const partes = String(valor).split('-');
            return partes.length === 3 ? partes[2] + '/' + partes[1] + '/' + partes[0] : valor;
        }

        function formatearDividendo(valor) {
            const numero = Number(valor || 0);
            return numero > 1 ? numero.toFixed(2) : 'S/E';
        }

        function escapar(valor) {
            return String(valor ?? '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

    </script>
</body>
</html>
